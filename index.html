<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#050505">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <link rel="icon" type="image/png" href="./icon-192.png">
    <title>RGB-11: SCI Multi-Layer QR Encoder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --r-color: #FF004D; --g-color: #00FF41; --b-color: #0088FF; --bg-color: #050505; }
        body { background: var(--bg-color); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        textarea { background: rgba(10, 10, 10, 0.6); border: 1px solid rgba(255,255,255,0.1); color: #fff; resize: none; transition: all 0.3s; }
        .logo-r { color: var(--r-color); text-shadow: 0 0 10px var(--r-color); }
        .logo-g { color: var(--g-color); text-shadow: 0 0 10px var(--g-color); }
        .logo-b { color: var(--b-color); text-shadow: 0 0 10px var(--b-color); }
        .scan-line { position: absolute; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--g-color), transparent); box-shadow: 0 0 15px var(--g-color); z-index: 20; animation: scanMove 2s infinite; }
        @keyframes scanMove { 0% { top: 0%; } 100% { top: 100%; } }
        .field-indicator { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 8px; height: 8px; border-radius: 50%; background: #333; transition: all 0.3s; z-index: 10; }
        .active-r { background: var(--r-color); box-shadow: 0 0 12px var(--r-color); }
        .active-g { background: var(--g-color); box-shadow: 0 0 12px var(--g-color); }
        .active-b { background: var(--b-color); box-shadow: 0 0 12px var(--b-color); }
        .viewfinder-corners { position: absolute; inset: 0; pointer-events: none; z-index: 15; }
        .corner { position: absolute; width: 20px; height: 20px; border-color: rgba(255,255,255,0.5); }
        .tl { top: 0; left: 0; border-top: 3px solid; border-left: 3px solid; border-radius: 8px 0 0 0; }
        .tr { top: 0; right: 0; border-top: 3px solid; border-right: 3px solid; border-radius: 0 8px 0 0; }
        .bl { bottom: 0; left: 0; border-bottom: 3px solid; border-left: 3px solid; border-radius: 0 0 0 8px; }
        .br { bottom: 0; right: 0; border-bottom: 3px solid; border-right: 3px solid; border-radius: 0 0 8px 0; }
        .targeting .corner { border-color: var(--g-color); box-shadow: 0 0 10px var(--g-color); }
        .hidden-scan { display: none; }
    </style>
</head>
<body class="p-4 pb-2">
    <header class="flex items-center justify-between mb-2 flex-shrink-0">
        <div class="flex items-center gap-2">
            <canvas id="mini-qr" width="32" height="32" class="rounded bg-zinc-900 border border-white/10"></canvas>
            <h1 class="text-xl font-black tracking-tighter">
                <span class="text-white">Q</span><span class="logo-r">R</span><span class="logo-g">G</span><span class="logo-b">B</span>
            </h1>
        </div>
        <button id="close-cam-btn" onclick="globalReset()" class="hidden text-red-500 text-xs font-bold border border-red-500/30 px-3 py-1 rounded-full">CLOSE</button>
    </header>

    <div id="input-fields" class="space-y-1.5 mb-3 flex-shrink-0">
        <div class="relative"><div id="ind-r" class="field-indicator"></div><textarea id="r-text" class="w-full p-2 pl-3 pr-8 rounded-lg h-9 text-xs" placeholder="RED CHANNEL"></textarea></div>
        <div class="relative"><div id="ind-g" class="field-indicator"></div><textarea id="g-text" class="w-full p-2 pl-3 pr-8 rounded-lg h-9 text-xs" placeholder="GREEN CHANNEL"></textarea></div>
        <div class="relative"><div id="ind-b" class="field-indicator"></div><textarea id="b-text" class="w-full p-2 pl-3 pr-8 rounded-lg h-9 text-xs" placeholder="BLUE CHANNEL"></textarea></div>
    </div>

    <div class="flex-1 flex flex-col items-center justify-center relative min-h-0">
        <div id="central-container" class="relative w-full max-w-xs aspect-square bg-zinc-950 rounded-2xl p-2 border border-white/5 overflow-hidden">
            <canvas id="qr-main" width="512" height="512" class="w-full h-full"></canvas>
            <video id="video" class="absolute inset-0 w-full h-full object-cover hidden" playsinline></video>
            <canvas id="freeze-frame" class="absolute inset-0 w-full h-full object-cover hidden"></canvas>
            <div class="viewfinder-corners hidden" id="viewfinder-ui">
                <div class="scan-line"></div>
                <div class="corner tl"></div><div class="corner tr"></div>
                <div class="corner bl"></div><div class="corner br"></div>
            </div>
        </div>
    </div>

    <div class="mt-4 flex flex-col items-center gap-2">
        <button id="scan-btn-main" onclick="showActions()" class="w-full max-w-xs py-3 bg-zinc-800 text-white font-bold rounded-xl text-xs uppercase tracking-widest">SCAN QR</button>
        <div id="action-group" class="hidden grid grid-cols-2 gap-2 w-full max-w-xs">
            <button onclick="startCamera()" class="py-3 bg-red-600 text-white font-bold rounded-xl text-xs uppercase">Camera</button>
            <button onclick="triggerFile()" class="py-3 bg-blue-600 text-white font-bold rounded-xl text-xs uppercase">Gallery</button>
        </div>
        <button id="save-btn" onclick="saveQR()" class="hidden w-full max-w-xs py-2 bg-white text-black font-bold rounded-xl text-xs uppercase">Save PNG</button>
    </div>

    <input type="file" id="file-input" accept="image/*" class="hidden" onchange="handleFile(event)">

    <script>
        const els = {
            r: document.getElementById('r-text'), g: document.getElementById('g-text'), b: document.getElementById('b-text'),
            main: document.getElementById('qr-main'), mini: document.getElementById('mini-qr'),
            video: document.getElementById('video'), freeze: document.getElementById('freeze-frame'),
            indR: document.getElementById('ind-r'), indG: document.getElementById('ind-g'), indB: document.getElementById('ind-b'),
            vUI: document.getElementById('viewfinder-ui'), btnMain: document.getElementById('scan-btn-main'),
            btnActions: document.getElementById('action-group'), closeBtn: document.getElementById('close-cam-btn')
        };

        let scanning = false;
        let results = {r:null, g:null, b:null};

        function generateQR() {
            const texts = [els.r.value, els.g.value, els.b.value];
            const ctx = els.main.getContext('2d');
            ctx.fillStyle = "#000"; ctx.fillRect(0,0,512,512);
            ctx.globalCompositeOperation = "lighten";
            
            texts.forEach((text, i) => {
                if(!text.trim()) return;
                const qr = qrcode(0, 'M'); qr.addData(unescape(encodeURIComponent(text))); qr.make();
                const mod = 512 / qr.getModuleCount();
                ctx.fillStyle = i === 0 ? "#FF0000" : (i === 1 ? "#00FF00" : "#0000FF");
                for (let r = 0; r < qr.getModuleCount(); r++)
                    for (let c = 0; c < qr.getModuleCount(); c++)
                        if (qr.isDark(r, c)) ctx.fillRect(c * mod, r * mod, mod, mod);
            });
            ctx.globalCompositeOperation = "source-over";
            els.mini.getContext('2d').drawImage(els.main, 0, 0, 32, 32);
            document.getElementById('save-btn').classList.toggle('hidden', !texts.some(t => t.trim()));
        }

        // --- УЛУЧШЕННЫЙ АЛГОРИТМ SCI ---
        function processImageData(imgData, w, h) {
            let foundInFrame = false;
            const channels = [
                { name: 'r', idx: 0, others: [1, 2] },
                { name: 'g', idx: 1, others: [0, 2] },
                { name: 'b', idx: 2, others: [0, 1] }
            ];

            channels.forEach(ch => {
                if (results[ch.name]) return;

                const buffer = new Uint8ClampedArray(w * h * 4);
                for (let i = 0; i < imgData.data.length; i += 4) {
                    let target = imgData.data[i + ch.idx];
                    let other1 = imgData.data[i + ch.others[0]];
                    let other2 = imgData.data[i + ch.others[1]];

                    // Математическая очистка: вычитаем соседние цвета, чтобы убрать шум
                    let clean = target - (other1 + other2) / 1.5;
                    let val = clean > 40 ? 255 : 0; // Порог бинаризации

                    buffer[i] = buffer[i+1] = buffer[i+2] = val;
                    buffer[i+3] = 255;
                }

                const code = jsQR(buffer, w, h, { inversionAttempts: "attemptBoth" });
                if (code) {
                    results[ch.name] = code.data;
                    els[ch.name].value = code.data;
                    document.getElementById('ind-' + ch.name).className = 'field-indicator active-' + ch.name;
                    foundInFrame = true;
                    playBeep();
                }
            });
            if (foundInFrame) generateQR();
            return foundInFrame;
        }

        async function startCamera() {
            scanning = true;
            els.vUI.classList.remove('hidden');
            els.video.classList.remove('hidden');
            els.closeBtn.classList.remove('hidden');
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            els.video.srcObject = stream;
            els.video.play();
            requestAnimationFrame(scanLoop);
        }

        function scanLoop() {
            if (!scanning) return;
            if (els.video.readyState === els.video.HAVE_ENOUGH_DATA) {
                const cv = document.createElement('canvas');
                cv.width = 400; cv.height = 400;
                const ctx = cv.getContext('2d');
                ctx.drawImage(els.video, 0, 0, 400, 400);
                if (processImageData(ctx.getImageData(0,0,400,400), 400, 400)) {
                    els.vUI.classList.add('targeting');
                    setTimeout(() => els.vUI.classList.remove('targeting'), 500);
                }
            }
            requestAnimationFrame(scanLoop);
        }

        function handleFile(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const cv = document.createElement('canvas');
                    cv.width = 800; cv.height = 800;
                    const ctx = cv.getContext('2d');
                    ctx.drawImage(img, 0, 0, 800, 800);
                    processImageData(ctx.getImageData(0,0,800,800), 800, 800);
                    els.freeze.getContext('2d').drawImage(img, 0,0, els.freeze.width, els.freeze.height);
                    els.freeze.classList.remove('hidden');
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        }

        function globalReset() {
            scanning = false;
            if (els.video.srcObject) els.video.srcObject.getTracks().forEach(t => t.stop());
            els.video.classList.add('hidden');
            els.freeze.classList.add('hidden');
            els.vUI.classList.add('hidden');
            els.closeBtn.classList.add('hidden');
            els.btnMain.classList.remove('hidden');
            els.btnActions.classList.add('hidden');
            results = {r:null, g:null, b:null};
            ['r','g','b'].forEach(c => {
                els[c].value = "";
                document.getElementById('ind-'+c).className = 'field-indicator';
            });
            generateQR();
        }

        function showActions() { els.btnMain.classList.add('hidden'); els.btnActions.classList.remove('hidden'); }
        function triggerFile() { document.getElementById('file-input').click(); }
        function saveQR() { const a = document.createElement('a'); a.download = 'RGB.png'; a.href = els.main.toDataURL(); a.click(); }
        function playBeep() { /* Simple beep logic */ }

        [els.r, els.g, els.b].forEach(el => el.addEventListener('input', generateQR));
        generateQR();
    </script>
</body>
</html>
