<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>▣ QRGB ULTRA - Final Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: ui-monospace, monospace; overflow-x: hidden; }
        canvas { image-rendering: pixelated; }
        textarea { background: #0a0a0a; border: 1px solid #333; color: #00ff41; font-size: 13px; }
        .scan-line { position:absolute; left:0; right:0; height:2px; background:#00ff41; box-shadow:0 0 15px #00ff41; animation:scan 3s linear infinite; z-index: 20; }
        @keyframes scan { 0%{top:0%} 100%{top:100%} }
        .flash-effect { animation: flash 0.3s ease-out forwards; }
        @keyframes flash { 0%{opacity:1} 100%{opacity:0} }
        .indicator { width: 10px; height: 10px; border-radius: 50%; background: #1a1a1a; border: 1px solid #333; }
        .active-r { background: #ff004d; box-shadow: 0 0 10px #ff004d; border:none; }
        .active-g { background: #00ff41; box-shadow: 0 0 10px #00ff41; border:none; }
        .active-b { background: #0088ff; box-shadow: 0 0 10px #0088ff; border:none; }
    </style>
</head>
<body class="flex flex-col min-h-screen p-5">

    <div class="flex items-center justify-between mb-4">
        <canvas id="mini-qr" width="40" height="40" class="rounded bg-zinc-900 border border-white/10"></canvas>
        <h1 class="text-[9px] tracking-[0.5em] font-black text-zinc-500 uppercase">System v4.0</h1>
        <div class="w-10"></div>
    </div>

    <div class="space-y-2 mb-6">
        <textarea id="r-text" class="w-full p-3 rounded-lg border-l-2 border-red-600 outline-none h-12" placeholder="RED..."></textarea>
        <textarea id="g-text" class="w-full p-3 rounded-lg border-l-2 border-green-600 outline-none h-12" placeholder="GREEN..."></textarea>
        <textarea id="b-text" class="w-full p-3 rounded-lg border-l-2 border-blue-600 outline-none h-12" placeholder="BLUE..."></textarea>
    </div>

    <div class="flex-1 flex items-center justify-center mb-8">
        <div class="relative w-64 h-64 bg-zinc-950 rounded-3xl p-4 border border-white/5 shadow-2xl">
            <canvas id="qr-main" width="512" height="512" class="w-full h-full opacity-0 transition-opacity duration-500"></canvas>
        </div>
    </div>

    <div class="space-y-3 pb-2">
        <button id="save-btn" onclick="saveQR()" class="w-full py-4 bg-white text-black font-black rounded-xl hidden text-[10px] tracking-widest uppercase">Save PNG</button>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="toggleScanner()" class="py-4 bg-zinc-900 text-white font-bold rounded-xl border border-white/10 text-[9px] uppercase tracking-widest">Camera</button>
            <input type="file" id="file-input" accept="image/*" class="hidden" onchange="handleFile(event)">
            <button onclick="document.getElementById('file-input').click()" class="py-4 bg-zinc-900 text-white font-bold rounded-xl border border-white/10 text-[9px] uppercase tracking-widest">Gallery</button>
        </div>
    </div>

    <div id="scanner-ui" class="fixed inset-0 z-[100] bg-black hidden flex flex-col p-6 overflow-hidden">
        <div class="flex justify-between items-center mb-4">
            <span class="text-[9px] text-zinc-600 font-bold uppercase tracking-widest">Optical Sync</span>
            <button onclick="closeScanner()" class="text-white bg-zinc-800 px-5 py-2 rounded-lg text-[9px] font-bold">CLOSE</button>
        </div>
        
        <div id="cam-box" class="relative w-full aspect-square bg-zinc-950 rounded-2xl overflow-hidden border border-white/10 shadow-2xl flex items-center justify-center">
            <video id="video" class="absolute inset-0 w-full h-full object-cover" playsinline></video>
            <canvas id="freeze-frame" class="max-w-full max-h-full object-contain hidden z-10"></canvas>
            <div id="scan-line-view" class="scan-line"></div>
            <div id="flash-layer" class="absolute inset-0 bg-white opacity-0 pointer-events-none z-50"></div>
        </div>

        <div class="mt-6 space-y-2">
            <div id="res-r" class="p-3 bg-zinc-900/60 rounded-xl flex items-center gap-4 border border-white/5">
                <div class="indicator"></div>
                <span class="text-[9px] text-zinc-500 truncate uppercase">R: Wait</span>
            </div>
            <div id="res-g" class="p-3 bg-zinc-900/60 rounded-xl flex items-center gap-4 border border-white/5">
                <div class="indicator"></div>
                <span class="text-[9px] text-zinc-500 truncate uppercase">G: Wait</span>
            </div>
            <div id="res-b" class="p-3 bg-zinc-900/60 rounded-xl flex items-center gap-4 border border-blue-900/30">
                <div class="indicator"></div>
                <span class="text-[9px] text-zinc-400 font-bold uppercase tracking-tight">B: Priority</span>
            </div>
        </div>
    </div>

    <script>
        const els = {
            r: document.getElementById('r-text'),
            g: document.getElementById('g-text'),
            b: document.getElementById('b-text'),
            main: document.getElementById('qr-main'),
            mini: document.getElementById('mini-qr'),
            video: document.getElementById('video'),
            freeze: document.getElementById('freeze-frame')
        };

        const beep = (isFinal = false) => {
            try {
                const ac = new (window.AudioContext || window.webkitAudioContext)();
                const os = ac.createOscillator();
                const gn = ac.createGain();
                os.type = isFinal ? 'square' : 'sine';
                os.frequency.setValueAtTime(isFinal ? 150 : 900, ac.currentTime);
                gn.gain.setValueAtTime(0.05, ac.currentTime);
                gn.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 0.1);
                os.connect(gn); gn.connect(ac.destination);
                os.start(); os.stop(ac.currentTime + 0.15);
            } catch(e) {}
        };

        function generateQR() {
            const texts = [els.r.value, els.g.value, els.b.value];
            if (!texts.some(t => t.trim())) { els.main.style.opacity = 0; return; }
            let maxVer = 1;
            texts.forEach(t => {
                if(!t.trim()) return;
                const tmp = qrcode(0, 'M'); tmp.addData(t); tmp.make();
                const v = Math.floor((tmp.getModuleCount() - 17) / 4);
                if (v > maxVer) maxVer = v;
            });
            const ctx = els.main.getContext('2d');
            ctx.fillStyle = "#000"; ctx.fillRect(0,0,512,512);
            ctx.globalCompositeOperation = "lighten";
            texts.forEach((text, i) => {
                if(!text.trim()) return;
                const qr = qrcode(maxVer, 'M'); qr.addData(text); qr.make();
                const mod = 512 / qr.getModuleCount();
                ctx.fillStyle = i === 0 ? "#FF0000" : (i === 1 ? "#00FF00" : "#0000FF");
                for (let r = 0; r < qr.getModuleCount(); r++) {
                    for (let c = 0; c < qr.getModuleCount(); c++) {
                        if (qr.isDark(r, c)) ctx.fillRect(c * mod, r * mod, mod, mod);
                    }
                }
            });
            els.main.style.opacity = 1;
            document.getElementById('save-btn').classList.remove('hidden');
            els.mini.getContext('2d').drawImage(els.main, 0, 0, 40, 40);
        }

        [els.r, els.g, els.b].forEach(el => el.addEventListener('input', generateQR));

        let scanning = false;
        let results = {r:null, g:null, b:null};

        function closeScanner() {
            scanning = false;
            if (els.video.srcObject) els.video.srcObject.getTracks().forEach(t => t.stop());
            document.getElementById('scanner-ui').classList.add('hidden');
        }

        async function toggleScanner() {
            results = {r:null, g:null, b:null};
            ['r','g','b'].forEach(ch => {
                const el = document.getElementById('res-'+ch);
                el.querySelector('span').textContent = ch.toUpperCase() + ': Wait';
                el.querySelector('.indicator').className = 'indicator';
            });
            document.getElementById('scanner-ui').classList.remove('hidden');
            els.freeze.classList.add('hidden');
            document.getElementById('scan-line-view').classList.remove('hidden');
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                els.video.srcObject = s; els.video.play();
                scanning = true;
                requestAnimationFrame(scanLoop);
            } catch (e) { alert("Camera Lock"); closeScanner(); }
        }

        function scanLoop() {
            if (!scanning) return;
            if (els.video.readyState === els.video.HAVE_ENOUGH_DATA) {
                const cv = document.createElement('canvas');
                cv.width = 480; cv.height = 480;
                const cx = cv.getContext('2d');
                cx.drawImage(els.video, 0, 0, 480, 480);
                if(processData(cx.getImageData(0,0,480,480), 480, 480)) {
                    doCapture(els.video);
                }
            }
            requestAnimationFrame(scanLoop);
        }

        function processData(img, w, h) {
            let found = false;
            [0,1,2].forEach(idx => {
                const ch = ['r','g','b'][idx];
                if (results[ch]) return;
                const mono = new Uint8ClampedArray(img.data.length);
                for (let i = 0; i < img.data.length; i += 4) {
                    const v = img.data[i + idx];
                    const others = (img.data[i+(idx+1)%3] + img.data[i+(idx+2)%3]) / 2;
                    mono[i] = mono[i+1] = mono[i+2] = (v > 100 && v > others * 1.1) ? 0 : 255;
                    mono[i+3] = 255;
                }
                const code = jsQR(mono, w, h);
                if (code) {
                    results[ch] = code.data;
                    const el = document.getElementById('res-'+ch);
                    el.querySelector('span').textContent = code.data;
                    el.querySelector('.indicator').className = 'indicator active-'+ch;
                    if(ch === 'b') found = true; else beep(false);
                }
            });
            return found || (results.r && results.g && results.b);
        }

        function doCapture(source) {
            if (!scanning) return;
            scanning = false;
            const ctx = els.freeze.getContext('2d');
            els.freeze.width = 600; els.freeze.height = 600;
            ctx.drawImage(source, 0, 0, 600, 600);
            els.freeze.classList.remove('hidden');
            document.getElementById('scan-line-view').classList.add('hidden');
            document.getElementById('flash-layer').classList.add('flash-effect');
            beep(true);
            setTimeout(() => document.getElementById('flash-layer').classList.remove('flash-effect'), 300);
        }

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    results = {r:null, g:null, b:null};
                    document.getElementById('scanner-ui').classList.remove('hidden');
                    
                    // Обработка картинки
                    const cv = document.createElement('canvas');
                    cv.width = 600; cv.height = 600;
                    const cx = cv.getContext('2d');
                    cx.drawImage(img, 0, 0, 600, 600);
                    
                    processData(cx.getImageData(0,0,600,600), 600, 600);
                    doCapture(img);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        function saveQR() {
            const a = document.createElement('a');
            a.download = 'QRGB_PRO.png'; a.href = els.main.toDataURL(); a.click();
        }
    </script>
</body>
</html>
