<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRGB</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        h1 { margin-bottom: 20px; }
        .input-group { width: 100%; max-width: 400px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; box-sizing: border-box; }
        .display-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .block { height: 60px; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 12px; text-shadow: 1px 1px 2px #000; overflow: hidden; }
        #block-r { background-color: #ff4444; }
        #block-g { background-color: #44ff44; color: #000; text-shadow: none; }
        #block-b { background-color: #4444ff; }
        #qrcode { background: #fff; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <h1>QRGB</h1>

    <div class="input-group">
        <input type="text" id="input-r" placeholder="Red text" oninput="generate()">
        <input type="text" id="input-g" placeholder="Green text" oninput="generate()">
        <input type="text" id="input-b" placeholder="Blue text" oninput="generate()">
    </div>

    <div class="display-container">
        <div id="block-r" class="block"></div>
        <div id="block-g" class="block"></div>
        <div id="block-b" class="block"></div>
    </div>

    <div id="qrcode"></div>

    <script>
        const qrcode = new QRCode(document.getElementById("qrcode"), {
            width: 160,
            height: 160,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        function generate() {
            const r = document.getElementById('input-r').value;
            const g = document.getElementById('input-g').value;
            const b = document.getElementById('input-b').value;

            // Обновляем текст в блоках
            document.getElementById('block-r').textContent = r;
            document.getElementById('block-g').textContent = g;
            document.getElementById('block-b').textContent = b;

            // Генерируем QR из объединенной строки
            const combinedText = `R:${r}|G:${g}|B:${b}`;
            qrcode.makeCode(combinedText);
        }

        // Начальная генерация
        generate();
    </script>
</body>
</html>
