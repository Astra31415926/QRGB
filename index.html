<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>▣ QRGB ULTRA - Pro Engine v4.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', system-ui, sans-serif; overflow-x: hidden; }
        canvas { image-rendering: pixelated; }
        textarea { background: #0a0a0a; border: 1px solid #333; color: #fff; font-family: monospace; }
        
        /* Логотип */
        .logo-q { color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.6); }
        .logo-r { color: #FF004D; text-shadow: 0 0 10px #FF004D; }
        .logo-g { color: #00FF41; text-shadow: 0 0 10px #00FF41; }
        .logo-b { color: #0088FF; text-shadow: 0 0 10px #0088FF; }

        /* Анимация сканирования */
        .scan-line { 
            position:absolute; left:0; right:0; height:3px; 
            background:linear-gradient(90deg,transparent,#00ff41,transparent); 
            box-shadow:0 0 20px #00ff41; 
            top: 0; 
            z-index: 10;
            display: none;
        }
        .scan-active .scan-line {
            display: block;
            animation: scanLine 2.5s linear forwards;
        }
        @keyframes scanLine { 
            0%{top:0%;} 
            100%{top:100%;} 
        }
        
        @keyframes flash { 0%,100%{opacity:0} 50%{opacity:.9} }
        .flash { animation:flash .3s; }
        
        .indicator { width: 12px; height: 12px; border-radius: 50%; background: #222; border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; }
        .active-r { background: #ff004d; box-shadow: 0 0 10px #ff004d; }
        .active-g { background: #00ff41; box-shadow: 0 0 10px #00ff41; }
        .active-b { background: #0088ff; box-shadow: 0 0 10px #0088ff; }
        
        /* Видео и Картинки */
        #video { object-fit: cover; }
        
        /* Меню и Модалки */
        .dropdown-menu {
            transform: translateY(-10px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
        }
        .dropdown-menu.show {
            transform: translateY(0);
            opacity: 1;
            visibility: visible;
        }
        
        .modal-overlay {
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-content {
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        .modal-overlay.show .modal-content {
            transform: scale(1);
        }

        /* Переключатель языков */
        .lang-switch {
            display: flex;
            gap: 2px;
            background: #1a1a1a;
            padding: 2px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
        }
        .lang-btn {
            padding: 4px 6px;
            border-radius: 4px;
            cursor: pointer;
            opacity: 0.5;
            transition: all 0.2s;
        }
        .lang-btn.active {
            opacity: 1;
            background: #333;
            color: #fff;
        }
        
        /* Стили для ссылок в модалке */
        .modal-content a { color: #60a5fa; text-decoration: underline; }
        .modal-content a:hover { color: #93c5fd; }
    </style>
</head>
<body class="flex flex-col min-h-screen p-6">

    <!-- Header -->
    <div class="flex items-center justify-between mb-6 relative">
        <canvas id="mini-qr" width="44" height="44" class="rounded bg-zinc-900 border border-white/10"></canvas>
        
        <!-- Логотип QRGB -->
        <h1 class="text-xl font-extrabold tracking-widest uppercase text-center flex-1 flex justify-center gap-0.5">
            <span class="logo-q">Q</span><span class="logo-r">R</span><span class="logo-g">G</span><span class="logo-b">B</span>
        </h1>
        
        <!-- Language Switcher & Menu -->
        <div class="flex items-center gap-3 z-50">
            <div class="lang-switch">
                <div id="lang-uk" class="lang-btn active" onclick="setLanguage('uk')">UK</div>
                <div id="lang-en" class="lang-btn" onclick="setLanguage('en')">EN</div>
            </div>
            <button id="menu-btn" class="w-10 text-white text-xl active:scale-90 transition-transform">☰</button>
        </div>
        
        <!-- Выпадающее меню -->
        <div id="dropdown" class="dropdown-menu absolute top-full right-0 mt-2 w-56 bg-zinc-900 rounded-xl border border-white/10 shadow-2xl z-50 overflow-hidden">
            <a href="#" onclick="openModal('usage')" class="block px-4 py-3 text-xs text-zinc-300 hover:bg-zinc-800 border-b border-white/5" data-i18n="menu_usage">Як користуватися</a>
            <a href="#" onclick="openModal('tech')" class="block px-4 py-3 text-xs text-zinc-300 hover:bg-zinc-800 border-b border-white/5" data-i18n="menu_tech">Технологія</a>
            <a href="#" onclick="openModal('author')" class="block px-4 py-3 text-xs text-zinc-300 hover:bg-zinc-800 border-b border-white/5" data-i18n="menu_author">Автор і контакти</a>
            <button onclick="globalReset()" class="w-full text-left px-4 py-3 text-xs text-red-400 hover:bg-zinc-800 font-bold uppercase tracking-wide" data-i18n="menu_reset">Reset / Очистити всё</button>
        </div>
    </div>

    <!-- Inputs -->
    <div class="space-y-3 mb-6">
        <textarea id="r-text" class="w-full p-4 rounded-xl border-l-4 border-red-600 outline-none h-14 text-sm" placeholder="RED CHANNEL..."></textarea>
        <textarea id="g-text" class="w-full p-4 rounded-xl border-l-4 border-green-600 outline-none h-14 text-sm" placeholder="GREEN CHANNEL..."></textarea>
        <textarea id="b-text" class="w-full p-4 rounded-xl border-l-4 border-blue-600 outline-none h-14 text-sm" placeholder="BLUE (PRIORITY)..."></textarea>
    </div>

    <!-- Central Frame (Unified Display) -->
    <div class="flex-1 flex flex-col items-center justify-center mb-6">
        <div id="central-container" class="relative w-72 h-72 bg-zinc-950 rounded-[2rem] p-5 border border-white/5 shadow-2xl overflow-hidden">
            <!-- Layers: QR, Video, Image -->
            <canvas id="qr-main" width="512" height="512" class="w-full h-full transition-opacity duration-500"></canvas>
            <video id="video" class="absolute inset-0 w-full h-full object-cover hidden" playsinline></video>
            <canvas id="freeze-frame" class="absolute inset-0 w-full h-full object-cover hidden z-10"></canvas>
            
            <!-- Overlays -->
            <div class="scan-line"></div>
            <div id="flash-layer" class="absolute inset-0 bg-white opacity-0 pointer-events-none z-50"></div>
        </div>

        <!-- Result Indicators (Moved from scanner-ui) -->
        <div id="result-indicators" class="w-72 mt-4 space-y-2 opacity-0 transition-opacity duration-300">
            <div id="res-r" class="p-3 bg-zinc-900/60 rounded-xl flex items-center gap-3 border border-white/5">
                <div class="indicator"></div>
                <span class="text-[10px] text-zinc-500 uppercase tracking-tighter">R: Waiting...</span>
            </div>
            <div id="res-g" class="p-3 bg-zinc-900/60 rounded-xl flex items-center gap-3 border border-white/5">
                <div class="indicator"></div>
                <span class="text-[10px] text-zinc-500 uppercase tracking-tighter">G: Waiting...</span>
            </div>
            <div id="res-b" class="p-3 bg-zinc-900/60 rounded-xl flex items-center gap-3 border border-blue-500/20">
                <div class="indicator"></div>
                <span class="text-[10px] text-zinc-400 uppercase tracking-tighter">B: Priority Ready</span>
            </div>
        </div>
    </div>

    <!-- Actions -->
    <div class="space-y-3 pb-4">
        <button id="save-btn" onclick="saveQR()" class="w-full py-4 bg-white text-black font-black rounded-2xl hidden active:scale-95 text-xs tracking-widest uppercase" data-i18n="btn_save">Save Result</button>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="startCamera()" class="py-4 bg-zinc-900 text-white font-bold rounded-2xl border border-white/10 active:scale-95 text-[10px] uppercase tracking-widest" data-i18n="btn_camera">Open Camera</button>
            <input type="file" id="file-input" accept="image/*" class="hidden" onchange="handleFile(event)">
            <button onclick="triggerFileInput()" class="py-4 bg-zinc-900 text-white font-bold rounded-2xl border border-white/10 active:scale-95 text-[10px] uppercase tracking-widest" data-i18n="btn_gallery">Open Gallery</button>
        </div>
    </div>

    <!-- Modal Window (Glassmorphism) -->
    <div id="modal-overlay" class="modal-overlay fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/60 backdrop-blur-xl">
        <!-- Added max-h-[80vh] overflow-y-auto as requested -->
        <div class="modal-content w-full max-w-md bg-zinc-900/80 border border-white/10 rounded-3xl p-6 shadow-2xl relative max-h-[80vh] overflow-y-auto">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-zinc-500 hover:text-white text-xs font-bold border border-white/10 px-3 py-1 rounded-lg" data-i18n="btn_close">CLOSE</button>
            <h2 id="modal-title" class="text-lg font-bold mb-4 pr-10"></h2>
            <div id="modal-body" class="text-sm text-zinc-300 space-y-4 leading-relaxed"></div>
        </div>
    </div>

    <script>
        // --- LOCALIZATION ENGINE (UPDATED) ---
        const translations = {
            uk: {
                menu_usage: "Як користуватися",
                menu_tech: "Технологія",
                menu_author: "Автор і контакти",
                menu_reset: "Reset / Очистити всё",
                btn_save: "Зберегти PNG",
                btn_camera: "Камера",
                btn_gallery: "Галерея",
                scan_title: "Спектральний Аналіз",
                btn_close: "ЗАКРИТИ",
                ph_r: "Текст для Red...",
                ph_g: "Текст для Green...",
                ph_b: "Текст для Blue...",
                res_wait: "Очікування...",
                res_fail: "[!] Не вдалося зчитати",
                
                // Modal Content
                m_usage_title: "📝 Як користуватися сайтом",
                m_usage_body: `<p>Створювати кольорові (спектральні) 2D-коди. Тестувати їх зчитування з екрана або зображення.</p>`,
                
                m_tech_title: "⚙️ Технологія",
                m_tech_body: `<p>Кольорові 2D-коди розширюють класичний QR-код, розподіляючи дані по кольорових каналах. Класичний QR-код (Denso Wave, 1994) став основою. У цифровому середовищі такі коди працюють стабільно, але при друці виникає проблема міжканального змішування (cross-talk). Підхід автора дозволяє зменшити цей ефект, що описано у наукових публікаціях.</p>`,
                
                m_author_title: "🎨 Автор",
                m_author_body: `
                    <p><strong>Михайло Кашкаров</strong> — сайнс-арт художник, який працює на перетені світлочутливого живопису та спектрального дизайну.</p>
                    <div class="mt-4 pt-4 border-t border-white/10">
                        <h3 class="font-bold mb-2">📚 Публікації:</h3>
                        <ul class="space-y-1 text-xs">
                            <li><a href="https://zenodo.org/records/18895764" target="_blank">Zenodo Research</a></li>
                            <li><a href="https://medium.com/@Bakminsterfuler/sci-universal-model-905efe92e766" target="_blank">Medium Article</a></li>
                            <li><a href="https://telegra.ph/White-Paper-SCI-Encoding-02-22" target="_blank">White Paper (UA)</a></li>
                            <li><a href="https://telegra.ph/RSS-Reflectance-Synchronized-System-02-19" target="_blank">RSS System</a></li>
                        </ul>
                        <div class="mt-4 text-white text-xs">
                            <p>📩 bakminsterfuler@gmail.com</p>
                            <p>🌐 <a href="https://astra31415926.github.io/" class="text-blue-400">astra31415926.github.io</a></p>
                        </div>
                    </div>`
            },
            en: {
                menu_usage: "How to use",
                menu_tech: "Technology",
                menu_author: "Author & Contacts",
                menu_reset: "Reset / Clear All",
                btn_save: "Save PNG",
                btn_camera: "Camera",
                btn_gallery: "Gallery",
                scan_title: "Spectral Analysis",
                btn_close: "CLOSE",
                ph_r: "Text for Red...",
                ph_g: "Text for Green...",
                ph_b: "Text for Blue...",
                res_wait: "Waiting...",
                res_fail: "[!] Failed to decode",
                
                // Modal Content
                m_usage_title: "📝 How to use",
                m_usage_body: `<p>Create spectral RGB 2D codes. Test decoding from screens or images.</p>`,
                
                m_tech_title: "⚙️ Technology",
                m_tech_body: `<p>Spectral 2D codes expand traditional QR by distributing data across color channels. The author's method stabilizes channel cross-talk for print applications.</p>`,
                
                m_author_title: "🎨 Author",
                m_author_body: `
                    <p><strong>Mykhailo Kashkarov</strong> — Science-Art artist specializing in optics and spectral design.</p>
                    <div class="mt-4 pt-4 border-t border-white/10">
                         <h3 class="font-bold mb-2">📚 Publications:</h3>
                        <ul class="space-y-1 text-xs">
                            <li><a href="https://zenodo.org/records/18895764" target="_blank">Zenodo Research</a></li>
                            <li><a href="https://medium.com/@Bakminsterfuler/sci-universal-model-905efe92e766" target="_blank">Medium Article</a></li>
                            <li><a href="https://telegra.ph/White-Paper-SCI-Encoding-02-22" target="_blank">White Paper (UA)</a></li>
                            <li><a href="https://telegra.ph/RSS-Reflectance-Synchronized-System-02-19" target="_blank">RSS System</a></li>
                        </ul>
                        <div class="mt-4 text-white text-xs">
                            <p>📩 bakminsterfuler@gmail.com</p>
                            <p>🌐 <a href="https://astra31415926.github.io/" class="text-blue-400">astra31415926.github.io</a></p>
                        </div>
                    </div>`
            }
        };

        let currentLang = 'uk';

        function setLanguage(lang) {
            currentLang = lang;
            document.getElementById('lang-uk').classList.toggle('active', lang === 'uk');
            document.getElementById('lang-en').classList.toggle('active', lang === 'en');

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });

            els.r.placeholder = translations[lang].ph_r;
            els.g.placeholder = translations[lang].ph_g;
            els.b.placeholder = translations[lang].ph_b;
            document.documentElement.lang = lang;
        }

        // --- MODAL LOGIC ---
        function openModal(type) {
            const prefix = 'm_' + type;
            const titleKey = prefix + '_title';
            const bodyKey = prefix + '_body';
            
            document.getElementById('modal-title').textContent = translations[currentLang][titleKey];
            document.getElementById('modal-body').innerHTML = translations[currentLang][bodyKey];
            
            document.getElementById('modal-overlay').classList.add('show');
            document.getElementById('dropdown').classList.remove('show');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('show');
        }
        
        document.getElementById('modal-overlay').addEventListener('click', (e) => {
            if (e.target.id === 'modal-overlay') closeModal();
        });

        // --- AUDIO ENGINE ---
        const AudioEngine = {
            ctx: null,
            initialized: false,
            
            init() {
                if(this.initialized) return;
                try {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    this.initialized = true;
                } catch(e) { console.error("Web Audio API not supported"); }
            },

            playScan() {
                if(!this.ctx) return;
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 2.5);

                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.05, now + 0.5);
                gain.gain.setValueAtTime(0.05, now + 2.0);
                gain.gain.linearRampToValueAtTime(0, now + 2.5);

                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(now);
                osc.stop(now + 2.6);
            },

            playResult(success) {
                if(!this.ctx) return;
                const now = this.ctx.currentTime;
                
                if(success) {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(2500, now);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.2);
                } else {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.setValueAtTime(100, now + 0.15);
                    
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.setValueAtTime(0, now + 0.15);
                    gain.gain.setValueAtTime(0.1, now + 0.2);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
                    
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.4);
                }
            }
        };

        document.body.addEventListener('click', () => AudioEngine.init(), { once: true });

        // --- ELEMENTS & STATE ---
        const els = {
            r: document.getElementById('r-text'),
            g: document.getElementById('g-text'),
            b: document.getElementById('b-text'),
            main: document.getElementById('qr-main'),
            mini: document.getElementById('mini-qr'),
            video: document.getElementById('video'),
            freeze: document.getElementById('freeze-frame'),
            centralContainer: document.getElementById('central-container'),
            flash: document.getElementById('flash-layer'),
            resultIndicators: document.getElementById('result-indicators'),
            resR: document.getElementById('res-r'),
            resG: document.getElementById('res-g'),
            resB: document.getElementById('res-b')
        };

        let scanning = false;
        let results = {r:null, g:null, b:null};
        let analysisReady = false;

        // --- MENU LOGIC ---
        document.getElementById('menu-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('dropdown').classList.toggle('show');
        });
        document.addEventListener('click', (e) => {
            if (!e.target.closest('#dropdown') && !e.target.closest('#menu-btn') && !e.target.closest('.lang-switch')) {
                document.getElementById('dropdown').classList.remove('show');
            }
        });

        function globalReset() {
            stopCamera();
            els.r.value = ""; els.g.value = ""; els.b.value = "";
            generateQR(); // Refresh view
            
            // Hide indicators
            els.resultIndicators.style.opacity = 0;
            
            // Show main canvas
            els.main.classList.remove('hidden');
            els.freeze.classList.add('hidden');
            els.video.classList.add('hidden');
            
            document.getElementById('dropdown').classList.remove('show');
        }

        // --- QR Generation with UTF-8 ---
        function generateQR() {
            const texts = [els.r.value, els.g.value, els.b.value];
            if (!texts.some(t => t.trim())) {
                els.main.style.opacity = 0;
                document.getElementById('save-btn').classList.add('hidden');
                return;
            }
            
            // Show canvas if hidden
            els.main.style.opacity = 1;
            els.freeze.classList.add('hidden');
            els.video.classList.add('hidden');
            
            let maxVer = 1;
            texts.forEach(t => {
                if(!t.trim()) return;
                const tmp = qrcode(0, 'M'); 
                tmp.addData(unescape(encodeURIComponent(t || " ")));
                tmp.make();
                const v = Math.floor((tmp.getModuleCount() - 17) / 4);
                if (v > maxVer) maxVer = v;
            });
            
            const ctx = els.main.getContext('2d');
            ctx.fillStyle = "#000"; ctx.fillRect(0,0,512,512);
            ctx.globalCompositeOperation = "lighten";
            
            texts.forEach((text, i) => {
                if(!text.trim()) return;
                const qr = qrcode(maxVer, 'M'); 
                qr.addData(unescape(encodeURIComponent(text)));
                qr.make();
                const mod = 512 / qr.getModuleCount();
                ctx.fillStyle = i === 0 ? "#FF0000" : (i === 1 ? "#00FF00" : "#0000FF");
                for (let r = 0; r < qr.getModuleCount(); r++) {
                    for (let c = 0; c < qr.getModuleCount(); c++) {
                        if (qr.isDark(r, c)) ctx.fillRect(c * mod, r * mod, mod, mod);
                    }
                }
            });
            
            ctx.globalCompositeOperation = "source-over";
            els.main.style.opacity = 1;
            document.getElementById('save-btn').classList.remove('hidden');
            els.mini.getContext('2d').drawImage(els.main, 0, 0, 44, 44);
        }
        [els.r, els.g, els.b].forEach(el => el.addEventListener('input', generateQR));

        // --- SCANNER LOGIC (SEAMLESS) ---

        function triggerFileInput() {
            els.r.value = ""; els.g.value = ""; els.b.value = ""; // Auto-clear
            document.getElementById('file-input').click();
        }

        function startCamera() {
            els.r.value = ""; els.g.value = ""; els.b.value = ""; // Auto-clear
            prepareScannerUI();
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(s => {
                    els.video.srcObject = s;
                    els.video.play();
                    scanning = true;
                    requestAnimationFrame(scanFrame);
                })
                .catch(e => { 
                    alert("Camera Error"); 
                    stopCamera(); 
                });
        }

        function stopCamera() {
            scanning = false;
            if (els.video.srcObject) els.video.srcObject.getTracks().forEach(t => t.stop());
        }

        function prepareScannerUI() {
            results = {r:null, g:null, b:null};
            analysisReady = false;
            
            // Hide QR, Show Video
            els.main.style.opacity = 0;
            els.freeze.classList.add('hidden');
            els.video.classList.remove('hidden');
            
            // Show and Reset Indicators
            els.resultIndicators.style.opacity = 1;
            ['r', 'g', 'b'].forEach(ch => {
                const el = els['res' + ch.toUpperCase()];
                el.querySelector('span').textContent = ch.toUpperCase() + ': ' + translations[currentLang].res_wait;
                el.querySelector('.indicator').className = 'indicator';
                el.classList.remove('hidden');
                el.style.opacity = 0.5;
            });
        }

        function scanFrame() {
            if (!scanning) return;
            
            if (els.video.readyState === els.video.HAVE_ENOUGH_DATA) {
                const cv = document.createElement('canvas');
                cv.width = 480; cv.height = 480;
                const cx = cv.getContext('2d');
                
                const vw = els.video.videoWidth;
                const vh = els.video.videoHeight;
                const aspect = vw / vh;
                
                let sx = 0, sy = 0, sw = vw, sh = vh;
                if (aspect > 1) { sw = vh; sx = (vw - sw) / 2; } 
                else { sh = vw; sy = (vh - sh) / 2; }
                
                cx.drawImage(els.video, sx, sy, sw, sh, 0, 0, 480, 480);
                
                if(!analysisReady) {
                    processImageData(cx.getImageData(0,0,480,480), 480, 480, false);
                }
            }
            requestAnimationFrame(scanFrame);
        }

        function processImageData(img, w, h, isFileScan) {
            let foundAny = false;
            
            [0, 1, 2].forEach(idx => {
                const ch = ['r', 'g', 'b'][idx];
                if (results[ch]) return;

                const mono = new Uint8ClampedArray(img.data.length);
                
                for (let i = 0; i < img.data.length; i += 4) {
                    const v = img.data[i + idx];
                    const b = v < 120 ? 0 : 255; 
                    mono[i] = mono[i+1] = mono[i+2] = b;
                    mono[i+3] = 255;
                }

                const code = jsQR(mono, w, h, { inversionAttempts: "attemptBoth" });
                
                if (code) {
                    results[ch] = code.data;
                    foundAny = true;
                }
            });

            if(foundAny) {
                if (results.b || (results.r && results.g && results.b)) {
                    analysisReady = true;
                    
                    if(isFileScan) {
                        // Handled in file handler
                    } else {
                        triggerCaptureSequence();
                    }
                }
            }
            return foundAny;
        }

        function triggerCaptureSequence() {
            stopCamera(); // Stop video stream
            
            // Draw freeze frame
            els.freeze.width = 480; els.freeze.height = 480;
            const fctx = els.freeze.getContext('2d');
            
            const vw = els.video.videoWidth;
            const vh = els.video.videoHeight;
            const aspect = vw / vh;
            let sx = 0, sy = 0, sw = vw, sh = vh;
            if (aspect > 1) { sw = vh; sx = (vw - sw) / 2; } 
            else { sh = vw; sy = (vh - sh) / 2; }
            fctx.drawImage(els.video, sx, sy, sw, sh, 0, 0, 480, 480);
            
            els.video.classList.add('hidden');
            els.freeze.classList.remove('hidden');
            
            startVisualizationSequence(true);
        }

        function startVisualizationSequence(success) {
            els.centralContainer.classList.add('scan-active');
            if(success) AudioEngine.playScan();
            
            setTimeout(() => {
                els.flash.classList.add('flash');
                AudioEngine.playResult(success);
                setTimeout(() => els.flash.classList.remove('flash'), 300);
                
                if(success) updateResultUI();
                else handleFailUI();
            }, 2500);
        }

        function updateResultUI() {
            ['r', 'g', 'b'].forEach(ch => {
                const el = els['res' + ch.toUpperCase()];
                const data = results[ch];
                
                if(data) {
                    el.querySelector('span').textContent = data;
                    el.querySelector('.indicator').className = 'indicator active-'+ch;
                    el.classList.remove('hidden');
                    el.style.opacity = 1;
                    els[ch].value = data; // This triggers generateQR via input listener
                } else {
                    el.classList.add('hidden');
                }
            });
            
            // generateQR is called automatically by input event, which will show qr-main
        }

        function handleFailUI() {
            ['r', 'g', 'b'].forEach(ch => {
                const el = els['res' + ch.toUpperCase()];
                el.classList.remove('hidden');
                el.style.opacity = 1;
                el.querySelector('span').textContent = translations[currentLang].res_fail;
                el.querySelector('.indicator').className = 'indicator';
            });
        }

        // --- File Handler ---
        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    prepareScannerUI(); // Reset UI
                    
                    els.freeze.width = 480; els.freeze.height = 480;
                    const fctx = els.freeze.getContext('2d');
                    fctx.fillStyle = "#000"; fctx.fillRect(0, 0, 480, 480);
                    
                    const aspect = img.width / img.height;
                    let sx = 0, sy = 0, sw = img.width, sh = img.height;
                    if (aspect > 1) { sw = img.height; sx = (img.width - sw) / 2; } 
                    else { sh = img.width; sy = (img.height - sh) / 2; }
                    
                    fctx.drawImage(img, sx, sy, sw, sh, 0, 0, 480, 480);
                    
                    els.freeze.classList.remove('hidden');
                    els.video.classList.add('hidden');

                    const scanSize = 1024;
                    const scv = document.createElement('canvas');
                    scv.width = scanSize; scv.height = scanSize;
                    const sctx = scv.getContext('2d');
                    
                    let ssx=0, ssy=0, ssw=img.width, ssh=img.height;
                    const sAspect = img.width / img.height;
                    if (sAspect > 1) { ssw = img.height; ssx = (img.width - ssw) / 2; }
                    else { ssh = img.width; ssy = (img.height - ssh) / 2; }
                    
                    sctx.drawImage(img, ssx, ssy, ssw, ssh, 0, 0, scanSize, scanSize);
                    
                    processImageData(sctx.getImageData(0,0,scanSize,scanSize), scanSize, scanSize, true);
                    
                    startVisualizationSequence(analysisReady);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        function saveQR() {
            const a = document.createElement('a');
            a.download = 'QRGB_PRO.png'; a.href = els.main.toDataURL(); a.click();
        }
    </script>
</body>
</html>
