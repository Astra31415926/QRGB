<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>▣ QRGB ULTRA - Pro Engine v4.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: system-ui, sans-serif; overflow-x: hidden; }
        canvas { image-rendering: pixelated; }
        textarea { background: #0a0a0a; border: 1px solid #333; color: #fff; }
        
        /* Анимация сканирования */
        .scan-line { 
            position:absolute; left:0; right:0; height:3px; 
            background:linear-gradient(90deg,transparent,#00ff41,transparent); 
            box-shadow:0 0 20px #00ff41; 
            top: 0; 
            z-index: 10;
            display: none;
        }
        .scan-active .scan-line {
            display: block;
            animation: scanLine 2.5s linear forwards;
        }
        @keyframes scanLine { 
            0%{top:0%;} 
            100%{top:100%;} 
        }
        
        @keyframes flash { 0%,100%{opacity:0} 50%{opacity:.8} }
        .flash { animation:flash .3s; }
        
        .indicator { width: 12px; height: 12px; border-radius: 50%; background: #222; border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; }
        .active-r { background: #ff004d; box-shadow: 0 0 10px #ff004d; }
        .active-g { background: #00ff41; box-shadow: 0 0 10px #00ff41; }
        .active-b { background: #0088ff; box-shadow: 0 0 10px #0088ff; }
        
        /* Видео без искажений */
        #video { object-fit: cover; }
        
        /* Меню */
        .dropdown-menu {
            transform: translateY(-10px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
        }
        .dropdown-menu.show {
            transform: translateY(0);
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen p-6">

    <!-- Header -->
    <div class="flex items-center justify-between mb-6 relative">
        <canvas id="mini-qr" width="44" height="44" class="rounded bg-zinc-900 border border-white/10"></canvas>
        <h1 class="text-[10px] tracking-[0.4em] font-black text-zinc-500 uppercase text-center flex-1">QRGB Engine v4.1</h1>
        <button id="menu-btn" class="w-10 text-white text-xl active:scale-90 transition-transform">☰</button>
        
        <!-- Выпадающее меню -->
        <div id="dropdown" class="dropdown-menu absolute top-full right-0 mt-2 w-48 bg-zinc-900 rounded-xl border border-white/10 shadow-2xl z-50 overflow-hidden">
            <a href="#" class="block px-4 py-3 text-xs text-zinc-300 hover:bg-zinc-800 border-b border-white/5">Як користуватися</a>
            <a href="#" class="block px-4 py-3 text-xs text-zinc-300 hover:bg-zinc-800 border-b border-white/5">Технологія</a>
            <a href="#" class="block px-4 py-3 text-xs text-zinc-300 hover:bg-zinc-800">Автор і контакти</a>
        </div>
    </div>

    <!-- Inputs -->
    <div class="space-y-3 mb-6">
        <textarea id="r-text" class="w-full p-4 rounded-xl border-l-4 border-red-600 outline-none h-14 text-sm" placeholder="RED CHANNEL..."></textarea>
        <textarea id="g-text" class="w-full p-4 rounded-xl border-l-4 border-green-600 outline-none h-14 text-sm" placeholder="GREEN CHANNEL..."></textarea>
        <textarea id="b-text" class="w-full p-4 rounded-xl border-l-4 border-blue-600 outline-none h-14 text-sm" placeholder="BLUE (PRIORITY)..."></textarea>
    </div>

    <!-- QR Display -->
    <div class="flex-1 flex items-center justify-center mb-10">
        <div class="relative w-72 h-72 bg-zinc-950 rounded-[2rem] p-5 border border-white/5 shadow-2xl">
            <canvas id="qr-main" width="512" height="512" class="w-full h-full opacity-0 transition-opacity duration-500"></canvas>
        </div>
    </div>

    <!-- Actions -->
    <div class="space-y-3 pb-4">
        <button id="save-btn" onclick="saveQR()" class="w-full py-4 bg-white text-black font-black rounded-2xl hidden active:scale-95 text-xs tracking-widest uppercase">Save Result</button>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="startScannerUI()" class="py-4 bg-zinc-900 text-white font-bold rounded-2xl border border-white/10 active:scale-95 text-[10px] uppercase tracking-widest">Open Camera</button>
            <input type="file" id="file-input" accept="image/*" class="hidden" onchange="handleFile(event)">
            <button onclick="document.getElementById('file-input').click()" class="py-4 bg-zinc-900 text-white font-bold rounded-2xl border border-white/10 active:scale-95 text-[10px] uppercase tracking-widest">Open Gallery</button>
        </div>
    </div>

    <!-- Scanner UI -->
    <div id="scanner-ui" class="fixed inset-0 z-[100] bg-black hidden flex flex-col p-6">
        <div class="flex justify-between items-center mb-6">
            <span class="text-[10px] text-zinc-600 font-bold uppercase tracking-widest">Spectral Analysis</span>
            <button onclick="closeScanner()" class="text-white bg-zinc-800 px-6 py-2 rounded-xl text-[10px] font-black">CLOSE</button>
        </div>
        
        <div id="scan-container" class="relative w-full aspect-square bg-zinc-950 rounded-3xl overflow-hidden border border-white/10 shadow-2xl flex items-center justify-center">
            <video id="video" class="absolute inset-0 w-full h-full object-cover" playsinline></video>
            <canvas id="freeze-frame" class="absolute inset-0 w-full h-full object-cover hidden z-10"></canvas>
            <div class="scan-line"></div>
            <div id="flash-layer" class="absolute inset-0 bg-white opacity-0 pointer-events-none z-50"></div>
        </div>

        <div class="mt-8 space-y-3">
            <div id="res-r" class="p-4 bg-zinc-900/60 rounded-2xl flex items-center gap-4 border border-white/5">
                <div class="indicator"></div>
                <span class="text-[10px] text-zinc-500 uppercase tracking-tighter">R: Waiting...</span>
            </div>
            <div id="res-g" class="p-4 bg-zinc-900/60 rounded-2xl flex items-center gap-4 border border-white/5">
                <div class="indicator"></div>
                <span class="text-[10px] text-zinc-500 uppercase tracking-tighter">G: Waiting...</span>
            </div>
            <div id="res-b" class="p-4 bg-zinc-900/60 rounded-2xl flex items-center gap-4 border border-blue-500/20">
                <div class="indicator"></div>
                <span class="text-[10px] text-zinc-400 uppercase tracking-tighter">B: Priority Ready</span>
            </div>
            
            <!-- Кнопка Reset при ошибке -->
            <button id="fail-reset-btn" onclick="resetScannerState()" class="w-full py-4 bg-red-900/50 text-red-400 font-bold rounded-2xl border border-red-500/30 text-xs tracking-widest uppercase hidden">
                Reset / Спробувати ще
            </button>
        </div>
    </div>

    <script>
        const els = {
            r: document.getElementById('r-text'),
            g: document.getElementById('g-text'),
            b: document.getElementById('b-text'),
            main: document.getElementById('qr-main'),
            mini: document.getElementById('mini-qr'),
            video: document.getElementById('video'),
            freeze: document.getElementById('freeze-frame'),
            scanContainer: document.getElementById('scan-container'),
            flash: document.getElementById('flash-layer'),
            failBtn: document.getElementById('fail-reset-btn')
        };

        // --- Menu Logic ---
        document.getElementById('menu-btn').addEventListener('click', () => {
            document.getElementById('dropdown').classList.toggle('show');
        });
        document.addEventListener('click', (e) => {
            if (!e.target.closest('#menu-btn') && !e.target.closest('#dropdown')) {
                document.getElementById('dropdown').classList.remove('show');
            }
        });

        // --- Sound FX ---
        const beep = (type = 'success') => {
            try {
                const ac = new (window.AudioContext || window.webkitAudioContext)();
                const os = ac.createOscillator();
                const gn = ac.createGain();
                
                if (type === 'success') {
                    os.type = 'square'; os.frequency.setValueAtTime(600, ac.currentTime);
                    os.frequency.setValueAtTime(900, ac.currentTime + 0.1);
                } else if (type === 'fail') {
                    os.type = 'sawtooth'; os.frequency.setValueAtTime(150, ac.currentTime);
                    os.frequency.setValueAtTime(50, ac.currentTime + 0.2);
                } else { // tick
                    os.type = 'sine'; os.frequency.setValueAtTime(950, ac.currentTime);
                }
                
                gn.gain.setValueAtTime(0.1, ac.currentTime);
                gn.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 0.2);
                os.connect(gn); gn.connect(ac.destination);
                os.start(); os.stop(ac.currentTime + 0.3);
            } catch(e) {}
        };

        // --- QR Generation with UTF-8 ---
        function generateQR() {
            const texts = [els.r.value, els.g.value, els.b.value];
            if (!texts.some(t => t.trim())) {
                els.main.style.opacity = 0;
                document.getElementById('save-btn').classList.add('hidden');
                return;
            }
            
            let maxVer = 1;
            texts.forEach(t => {
                if(!t.trim()) return;
                const tmp = qrcode(0, 'M'); 
                tmp.addData(unescape(encodeURIComponent(t || " "))); // UTF-8 Hack
                tmp.make();
                const v = Math.floor((tmp.getModuleCount() - 17) / 4);
                if (v > maxVer) maxVer = v;
            });
            
            const ctx = els.main.getContext('2d');
            ctx.fillStyle = "#000"; ctx.fillRect(0,0,512,512);
            ctx.globalCompositeOperation = "lighten";
            
            texts.forEach((text, i) => {
                if(!text.trim()) return;
                const qr = qrcode(maxVer, 'M'); 
                qr.addData(unescape(encodeURIComponent(text))); // UTF-8 Hack
                qr.make();
                const mod = 512 / qr.getModuleCount();
                ctx.fillStyle = i === 0 ? "#FF0000" : (i === 1 ? "#00FF00" : "#0000FF");
                for (let r = 0; r < qr.getModuleCount(); r++) {
                    for (let c = 0; c < qr.getModuleCount(); c++) {
                        if (qr.isDark(r, c)) ctx.fillRect(c * mod, r * mod, mod, mod);
                    }
                }
            });
            
            ctx.globalCompositeOperation = "source-over";
            els.main.style.opacity = 1;
            document.getElementById('save-btn').classList.remove('hidden');
            els.mini.getContext('2d').drawImage(els.main, 0, 0, 44, 44);
        }
        [els.r, els.g, els.b].forEach(el => el.addEventListener('input', generateQR));

        // --- SCANNER LOGIC ---
        let scanning = false;
        let results = {r:null, g:null, b:null};
        let timer = null;
        let failTimer = null;

        function resetScannerState() {
            // Clear fields
            ['r', 'g', 'b'].forEach(ch => {
                const el = document.getElementById('res-'+ch);
                el.querySelector('span').textContent = ch.toUpperCase() + ': Waiting...';
                el.querySelector('.indicator').className = 'indicator';
                els[ch].value = "";
            });
            results = {r:null, g:null, b:null};
            els.failBtn.classList.add('hidden');
            
            // Reset visual
            els.scanContainer.classList.remove('scan-active');
            els.freeze.classList.add('hidden');
            els.video.classList.remove('hidden');
            
            // Restart logic
            clearTimeout(failTimer);
            failTimer = setTimeout(handleFail, 3000);
            scanning = true;
            requestAnimationFrame(scanFrame);
        }

        function startScannerUI() {
            const ui = document.getElementById('scanner-ui');
            ui.classList.remove('hidden');
            resetScannerState(); 
            startCamera();
        }

        function closeScanner() {
            scanning = false;
            clearTimeout(failTimer);
            if (els.video.srcObject) els.video.srcObject.getTracks().forEach(t => t.stop());
            document.getElementById('scanner-ui').classList.add('hidden');
        }

        async function startCamera() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                els.video.srcObject = s;
                els.video.play();
            } catch (e) { alert("Camera Error"); closeScanner(); }
        }

        function scanFrame() {
            if (!scanning) return;
            if (els.video.readyState === els.video.HAVE_ENOUGH_DATA && !els.freeze.classList.contains('hidden') === false) {
                // Исправление Aspect Ratio (Crop to Square)
                const cv = document.createElement('canvas');
                cv.width = 480; cv.height = 480;
                const cx = cv.getContext('2d');
                
                const vw = els.video.videoWidth;
                const vh = els.video.videoHeight;
                const aspect = vw / vh;
                
                let sx = 0, sy = 0, sw = vw, sh = vh;
                if (aspect > 1) { // Landscape
                    sw = vh; sx = (vw - sw) / 2;
                } else { // Portrait
                    sh = vw; sy = (vh - sh) / 2;
                }
                
                cx.drawImage(els.video, sx, sy, sw, sh, 0, 0, 480, 480);
                processImageData(cx.getImageData(0,0,480,480), 480, 480);
            }
            requestAnimationFrame(scanFrame);
        }

        // --- Обработка данных (Simple Threshold) ---
        function processImageData(img, w, h) {
            let foundAny = false;
            
            [0, 1, 2].forEach(idx => {
                const ch = ['r', 'g', 'b'][idx];
                if (results[ch]) return;

                const mono = new Uint8ClampedArray(img.data.length);
                
                // Proven Algorithm: Simple Threshold 120
                for (let i = 0; i < img.data.length; i += 4) {
                    const v = img.data[i + idx];
                    const b = v < 120 ? 0 : 255; 
                    mono[i] = mono[i+1] = mono[i+2] = b;
                    mono[i+3] = 255;
                }

                const code = jsQR(mono, w, h, { inversionAttempts: "attemptBoth" });
                
                if (code) {
                    results[ch] = code.data;
                    foundAny = true;
                    
                    // Если нашли что-то, сбрасываем таймер неудачи
                    clearTimeout(failTimer);
                    
                    // Logic: Если нашли B или все три -> SUCCESS
                    if (ch === 'b' || (results.r && results.g && results.b)) {
                        handleSuccess();
                    } else {
                        beep('tick');
                    }
                }
            });
            return foundAny;
        }

        function handleSuccess() {
            scanning = false;
            clearTimeout(failTimer);
            
            // 1. Freeze Frame (capture current video to canvas)
            els.freeze.width = 480; els.freeze.height = 480;
            const fctx = els.freeze.getContext('2d');
            // Re-draw with same crop logic
            const vw = els.video.videoWidth;
            const vh = els.video.videoHeight;
            const aspect = vw / vh;
            let sx = 0, sy = 0, sw = vw, sh = vh;
            if (aspect > 1) { sw = vh; sx = (vw - sw) / 2; } 
            else { sh = vw; sy = (vh - sh) / 2; }
            fctx.drawImage(els.video, sx, sy, sw, sh, 0, 0, 480, 480);
            
            els.video.classList.add('hidden');
            els.freeze.classList.remove('hidden');
            
            // 2. Trigger Animation
            els.scanContainer.classList.add('scan-active');
            
            // 3. Wait 2.5s
            setTimeout(() => {
                // Flash & Sound
                els.flash.classList.add('flash');
                beep('success');
                setTimeout(() => els.flash.classList.remove('flash'), 300);
                
                // Reveal Data
                ['r', 'g', 'b'].forEach(ch => {
                    const el = document.getElementById('res-'+ch);
                    const data = results[ch] || "-";
                    el.querySelector('span').textContent = data;
                    els[ch].value = data; // Fill inputs
                    if(results[ch]) el.querySelector('.indicator').className = 'indicator active-'+ch;
                });
                
                generateQR(); // Update main screen
                els.failBtn.classList.add('hidden');
                
            }, 2500);
        }

        function handleFail() {
            scanning = false;
            beep('fail');
            
            els.freeze.classList.add('hidden');
            els.video.classList.add('hidden'); // Hide video to show error state clearly
            
            ['r', 'g', 'b'].forEach(ch => {
                const el = document.getElementById('res-'+ch);
                el.querySelector('span').textContent = "[!] Не вдалося зчитати";
                el.querySelector('.indicator').className = 'indicator';
            });
            
            els.failBtn.classList.remove('hidden');
        }

        // --- File Handler ---
        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    // Open UI & Reset
                    const ui = document.getElementById('scanner-ui');
                    ui.classList.remove('hidden');
                    
                    // Reset State
                    results = {r:null, g:null, b:null};
                    ['r', 'g', 'b'].forEach(ch => {
                        const el = document.getElementById('res-'+ch);
                        el.querySelector('span').textContent = ch.toUpperCase() + ': Waiting...';
                        el.querySelector('.indicator').className = 'indicator';
                        els[ch].value = "";
                    });
                    els.failBtn.classList.add('hidden');
                    
                    // Show Image (Fit Contain)
                    els.freeze.width = 480; els.freeze.height = 480;
                    const fctx = els.freeze.getContext('2d');
                    fctx.fillStyle = "#000"; fctx.fillRect(0, 0, 480, 480);
                    const scale = Math.min(480 / img.width, 480 / img.height);
                    const nw = img.width * scale, nh = img.height * scale;
                    fctx.drawImage(img, (480 - nw) / 2, (480 - nh) / 2, nw, nh);
                    
                    els.freeze.classList.remove('hidden');
                    els.video.classList.add('hidden');
                    
                    // Run Scan Animation
                    els.scanContainer.classList.add('scan-active');
                    
                    // Process Image in background (resize to 1024 for quality)
                    setTimeout(() => {
                        const scanSize = 1024;
                        const scv = document.createElement('canvas');
                        scv.width = scanSize; scv.height = scanSize;
                        const sctx = scv.getContext('2d');
                        const sScale = Math.min(scanSize / img.width, scanSize / img.height);
                        const snw = img.width * sScale, snh = img.height * sScale;
                        sctx.drawImage(img, (scanSize - snw) / 2, (scanSize - snh) / 2, snw, snh);
                        
                        processImageData(sctx.getImageData(0,0,scanSize,scanSize), scanSize, scanSize);
                        
                        // Check results after 2.5s animation
                        setTimeout(() => {
                            els.scanContainer.classList.remove('scan-active');
                            els.flash.classList.add('flash');
                            
                            if (results.r || results.g || results.b) {
                                beep('success');
                                // Reveal Data
                                ['r', 'g', 'b'].forEach(ch => {
                                    const el = document.getElementById('res-'+ch);
                                    const data = results[ch] || "-";
                                    el.querySelector('span').textContent = data;
                                    els[ch].value = data;
                                    if(results[ch]) el.querySelector('.indicator').className = 'indicator active-'+ch;
                                });
                                generateQR();
                            } else {
                                handleFail();
                            }
                            setTimeout(() => els.flash.classList.remove('flash'), 300);
                        }, 2500);
                        
                    }, 50);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        function saveQR() {
            const a = document.createElement('a');
            a.download = 'QRGB_PRO.png'; a.href = els.main.toDataURL(); a.click();
        }
    </script>
</body>
</html>
